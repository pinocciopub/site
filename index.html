<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoccio Pub</title>
    <style>
        /* Import your custom font */
        @font-face {
            font-family: 'Mono';
            src: url('fonts/CommitMono-400-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #AEADAE;
            display: flex;
            flex-direction: column; /* Stacks elements vertically */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .logo-container {
            text-align: center;
        }

        .logo {
            width: 800px;
            height: auto;
            display: block;
        }

        /* The descriptive text */
        .description {
            font-family: 'Mono', monospace;
            font-size: 1rem;
            color: #333;
            margin-top: 20px; /* Padding between logo and text */
            text-align: center;
            line-height: 1.5;
            max-width: 800px;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="pinoccio-logo.png" alt="Pinoccio Logo" class="logo">
        <div class="description">
            Independent publishing house primarily focused on music and poetry.<br>
            Amsterdam - Gothenburg
        </div>
    </div>

</body>
</html>
