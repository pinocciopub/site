<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoccio Pub</title>
    <style>
        @font-face {
            font-family: 'Mono';
            src: url('CommitMono-400-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #EA2C2F;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Prevents scrollbars during the swing */
        }

        /* Top Left Header Group */
        .header-group {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 10;
        }

        .logo {
            width: 800px;
            max-width: 90vw;
            height: auto;
            display: block;
        }

        .description {
            font-family: 'Mono', monospace;
            font-size: 12px;
            color: #FFFFFF;
            line-height: 1.6;
        }

        /* The Animated Center Image */
        .center-image {
            max-width: 50%;
            max-height: 60vh;
            height: auto;
            margin-top: 120px;
            
            /* Animation Settings */
            transform-origin: top center; /* Pivots from the top where the hook is */
            animation: swing 3.5s ease-in-out infinite alternate;
        }

        /* The Swing Motion */
        @keyframes swing {
            0% {
                transform: rotate(-6deg);
            }
            100% {
                transform: rotate(6deg);
            }
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                justify-content: flex-start;
                padding: 20px;
                height: auto;
                overflow-y: auto;
            }

            .header-group {
                position: static;
                align-items: center;
                text-align: center;
                margin-bottom: 40px;
            }

            .logo {
                width: 100%;
                max-width: 300px;
            }
            
            .center-image {
                max-width: 80%;
                margin-top: 0;
            }
        }
    </style>
</head>
<body>

    <div class="header-group">
        <img src="pinoccio-logo-yellow.png" alt="Pinoccio Logo" class="logo">
        <div class="description">
            Independent publishing house primarily focused on music and poetry.<br>
            Amsterdam — Gothenburg
        </div>
    </div>

    <img src="start-img.png" alt="Dangling Illustration" class="center-image">

</body>
</html>
