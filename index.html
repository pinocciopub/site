<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoccio Pub</title>
    <style>
        @font-face {
            font-family: 'Mono';
            src: url('CommitMono-400-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Desktop Positioning - 20px symmetrical padding */
        .header-group {
            position: absolute;
            top: 10px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 10;
        }

        .logo {
            width: 260px; 
            max-width: 90vw;
            height: auto;
            display: block;
        }

        .description {
            font-family: 'Mono', monospace;
            font-size: 12px;
            color: #000000;
            line-height: 1.6;
            text-align: left;
        }

        /* The Animated Center Image (Dangling Illustration) */
        .center-image {
            max-width: 50%;
            max-height: 60vh;
            height: auto;
            margin-top: 120px;
            transform-origin: top center;
            animation: swing 3.5s ease-in-out infinite alternate;
        }

        @keyframes swing {
            0% { transform: rotate(-6deg); }
            100% { transform: rotate(6deg); }
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                justify-content: flex-start;
                padding: 20px;
                height: auto;
                overflow-y: auto;
            }

            .header-group {
                position: static;
                width: 100%;
                display: flex;
                flex-direction: column;
                /* Left-aligning header content for mobile */
                align-items: flex-start; 
                text-align: left; 
                margin-bottom: 40px;
            }

            .logo {
                width: 100%;
                max-width: 300px;
                margin: 0; /* Ensures logo doesn't center-align */
            }

            .description {
                font-size: 11px;
                line-height: 1.2; /* Tightened leading for mobile */
                width: 100%;
            }

            .center-image {
                max-width: 80%;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="header-group">
        <img src="pinocciologo-black.png" alt="Pinoccio Logo" class="logo">
        <div class="description">
            Independent publishing house primarily focused on music and poetry.<br>
       <br>     Amsterdam — Gothenburg
        </div>
    </div>

    <img src="start-img.png" alt="Dangling Illustration" class="center-image">

</body>
</html>
