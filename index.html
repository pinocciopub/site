<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoccio Pub</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #AEADAE;
            font-family: sans-serif;
            /* This centers the content in the middle of the screen */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Prevents scrollbars if the images are large */
        }

        /* Logo in the top left */
        .logo {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 800px;
            height: auto;
        }

        /* The main center image */
        .center-image {
            max-width: 80%;  /* Ensures it doesn't hit the edges of the screen */
            max-height: 70vh; /* Keeps it from overlapping with the logo area */
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <img src="pinoccio-logo.png" alt="Pinoccio Logo" class="logo">

    <img src="start-img.png" alt="Start Image" class="center-image">

</body>
</html>
