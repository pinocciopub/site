<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoccio Pub</title>
    <style>
        /* Font Setup */
        @font-face {
            font-family: 'Mono';
            src: url('CommitMono-400-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #AEADAE;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden; /* Prevents side-scrolling on mobile */
        }

        /* Desktop Positioning */
        .header-group {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .logo {
            width: 800px; /* Your requested desktop size */
            max-width: 90vw; /* Safety net so it never exceeds screen width */
            height: auto;
        }

        .description {
            font-family: 'Mono', monospace;
            font-size: 12px;
            color: #FFFFFF;
            line-height: 1.6;
            max-width: 500px;
        }

        /* Center Image */
        .center-image {
            max-width: 50%;
            max-height: 50vh;
            height: auto;
            margin-top: 100px; /* Pushes it down so it doesn't hide under the 800px logo */
        }

        /* MOBILE ADJUSTMENTS (Screens smaller than 768px) */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                justify-content: flex-start; /* Stack from top down */
                padding: 20px;
                height: auto;
            }

            .header-group {
                position: static; /* Removes the "top-left" absolute floating */
                align-items: center;
                text-align: center;
                margin-bottom: 40px;
            }

            .logo {
                width: 100%; /* Scales to phone width */
                max-width: 300px; /* Keeps it legible but not overwhelming */
            }

            .description {
                font-size: 11px;
                padding: 0 10px;
            }

            .center-image {
                max-width: 80%;
                margin-top: 0;
            }
        }
    </style>
</head>
<body>

    <div class="header-group">
        <img src="pinoccio-logo.png" alt="Pinoccio Logo" class="logo">
        <div class="description">
            Independent publishing house primarily focused on music and poetry.<br>
            Amsterdam — Gothenburg
        </div>
    </div>

    <img src="start-img.png" alt="Start Image" class="center-image">

</body>
</html>
