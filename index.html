<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoccio Pub</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #AEADAE;
            min-height: 100vh;
        }

        .logo {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 450px;
            height: auto;
        }

        /* The white content box */
        .content-box {
            background-color: #FFFFFF;
            padding: 40px;
            margin-top: 200px; /* Moves the box higher up */
            margin-left: auto;
            margin-right: auto;
            max-width: 800px;
            width: 90%;
            min-height: calc(100vh - 200px); /* Extends box to the end of the page */
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); /* Shadow at the top */
            text-align: center;
        }

        h1 {
            color: #333333;
            margin: 0;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <img src="pinoccio-logo.png" alt="Pinoccio Logo" class="logo">

    <div class="content-box">
        <h1>Coming Soon</h1>
    </div>

</body>
</html>
