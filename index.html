<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoccio Pub</title>
    <style>
        /* Font Setup */
        @font-face {
            font-family: 'Mono';
            src: url('CommitMono-400-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #AEADAE;
            height: 100vh;
            display: flex;
            justify-content: center; /* Centers start-img.png horizontally */
            align-items: center;     /* Centers start-img.png vertically */
            overflow: hidden;
        }

        /* Top Left Header Group */
        .header-group {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px; /* Spacing between logo and text */
        }

        .logo {
            width: 800px;
            height: auto;
            display: block;
        }

        .description {
            font-family: 'Mono', monospace;
            font-size: 12px;
            color: #FFFFFF; /* White text */
            line-height: 1.4;
            text-transform: none;
        }

        /* Center Image */
        .center-image {
            max-width: 60%; /* Adjusted so it doesn't collide with the massive logo */
            max-height: 60vh;
            height: auto;
            z-index: -1; /* Keeps it behind the logo if they overlap */
        }
    </style>
</head>
<body>

    <div class="header-group">
        <img src="pinoccio-logo.png" alt="Pinoccio Logo" class="logo">
        <div class="description">
            Independent publishing house primarily focused on music and poetry.<br>
            Amsterdam — Gothenburg
        </div>
    </div>

    <img src="start-img.png" alt="Start Image" class="center-image">

</body>
</html>
