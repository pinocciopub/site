<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoccio Pub | SKAMMEN</title>

        @font-face {
            font-family: 'Mono';
            src: url('CommitMono-400-Regular.woff') format('woff');

        }

        body {
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Desktop Positioning - 20px symmetrical padding */
        .header-group {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 10;
        }

        .logo {
            width: 600px; 
            max-width: 90vw;
            height: auto;
            display: block;
        }

        .description {
            font-family: 'Mono', monospace;
            font-size: 12px;
            color: #000000;
            line-height: 1.6;
            text-align: left;
        }

        .city-line {
            display: block;
            margin-top: 4px;
        }

        /* Clean Blue Link Styling */
        .press-link {
            display: inline-block;
            margin-top: 10px;
            color: #0000FF; 
            text-decoration: none; 
            font-family: 'Mono', monospace;
            font-size: 12px;
        }

        .press-link:hover {
            text-decoration: underline;
        }

        /* Scrollable Content Container */
        .content-container {
            max-width: 600px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
            margin-top: 120px; 
            padding-right: 0; 
            display: flex;
            flex-direction: column;
        }

        /* Container for Skammen Logo + [PRESS] Text */
        .logo-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            align-self: flex-start;
        }

        .skammen-logo {
            width: 100%;
            max-width: 400px;
            height: auto;
            display: block;
        }

        .press-text {
            font-family: 'Mono', monospace;
            font-size: 12px;
            color: #000000;
            white-space: nowrap;
        }

        /* Kalla Vindar Logo - Centered */
        .centered-logo {
            width: 100%;
            max-width: 300px;
            height: auto;
            margin: 20px auto 40px auto;
            display: block;
        }

        p {
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            color: #000000;
            line-height: 1.8;
            margin: 0;
            text-align: left;
        }

        /* Hide scrollbar stroke on the right */
        .content-container::-webkit-scrollbar {
            display: none;
        }
        .content-container {
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }
